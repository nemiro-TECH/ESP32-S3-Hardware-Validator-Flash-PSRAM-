esphome:
  name: test-n16r8
  comment: "ESP32-S3 N16R8 Hardware Validator (Flash & PSRAM) | Validador de Hardware"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

# Enable and validate Octal PSRAM for N16R8 model | Ativa e valida a PSRAM Octal do modelo N16R8
psram:
  mode: octal

# Debug component for internal memory analysis | Componente de debug para analise interna de memoria
debug:

# Required for Improv Serial provisioning | Obrigatório para provisionamento via Improv Serial
logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

# Map physical BOOT button (GPIO0) to authorize Improv | Mapeia botão físico de BOOT (GPIO0) para autorizar Improv
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    id: botao_boot_fisico
    name: "BOOT Button | Botão BOOT"

# Enable Bluetooth stack for BLE provisioning | Ativa a pilha Bluetooth para provisionamento BLE
esp32_ble:

# Improv via BLE component with required physical authorizer | Componente Improv via BLE com autorizador físico obrigatório
esp32_improv:
  authorizer: botao_boot_fisico # Requires a physical press on BOOT button to pair | Exige clique no botão BOOT para parear

# Improv via Serial (USB) component | Componente Improv via Serial (USB)
improv_serial:

# Network Configuration | Configuração de Rede
wifi:
  ssid: !secret wifi_ssid        # Your WiFi SSID from secrets.yaml | Seu SSID do WiFi no secrets.yaml
  password: !secret wifi_password # Your WiFi Password from secrets.yaml | Sua senha do WiFi no secrets.yaml
  
  # Active access point if Wi-Fi and Improv fail | Ativa ponto de acesso se o Wi-Fi e o Improv falharem
  ap:
    ssid: "Testador-N16R8 Fallback"

# Allows Home Assistant integration and OTA updates | Permite integração com Home Assistant e atualizações OTA
api:
ota:
  - platform: esphome
captive_portal:

# Configure internal RGB LED using RMT bus (Required for ESP-IDF) | Configura LED RGB interno usando barramento RMT (Obrigatório para ESP-IDF)
light:
  - platform: esp32_rmt_led_strip
    id: led_rgb_interno
    rgb_order: RGB               # Correct channel sequence for this board | Sequência de canais correta para esta placa
    chipset: ws2812              # Required property for signal timing | Propriedade obrigatória de tempo do sinal
    pin: GPIO38                  # Check Hardware pin for this specific AliExpress board | Verifique o pino de hardware para esta placa específica do AliExpress
    num_leds: 1
    name: "Status LED | LED de Status"
    effects:
      - strobe:
          name: "green"
          colors:
            - state: true
              red: 0.0
              green: 1.0
              blue: 0.0
              duration: 500ms
            - state: false
              duration: 500ms
      - strobe:
          name: "red"
          colors:
            - state: true
              red: 1.0
              green: 0.0
              blue: 0.0
              duration: 500ms
            - state: false
              duration: 500ms


# Restart button to trigger the hardware test remotely | Botão de restart para reiniciar o teste remotamente
button:
  - platform: restart
    name: "Restart ESP32 | Reiniciar ESP32"
    id: restart_botao

# Hardware validation sensor | Sensor de validação do hardware
text_sensor:
  - platform: template
    name: "Hardware Status | Status do Hardware"
    id: status_hardware
    icon: "mdi:chip"
    lambda: |-
      // Uses the heap capabilities API to check for 8MB PSRAM (8192 KB * 1024 bytes) | Verifica se o tamanho total de PSRAM equivale a 8MB
      if (heap_caps_get_total_size(MALLOC_CAP_SPIRAM) >= 8192 * 1024) {
        return {"Approved | Aprovado (ESP32-S3 N16R8)"};
      } else {
        return {"Failed | Falha: Incorrect Hardware | Hardware Incorreto"};
      }
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "Approved | Aprovado (ESP32-S3 N16R8)";'
            then:
              # Activate infinite green loop if approved | Ativa o loop verde infinito se passar
              - light.turn_on:
                  id: led_rgb_interno
                  effect: "green"
            else:
              # Activate infinite red loop if failed | Ativa o loop vermelho infinito se falhar
              - light.turn_on:
                  id: led_rgb_interno
                  effect: "red"
